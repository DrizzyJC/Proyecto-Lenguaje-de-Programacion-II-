<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FALABELLA ERP — Productos</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/falabella-ui.css}">
</head>

<body>

<div th:replace="~{fragments/menu :: header('Gestión de Productos')}"></div>

<div class="layout">

    <div th:replace="~{fragments/menu :: sidebar('productos')}"></div>

    <main class="main">

        <div class="page-header">
            <div class="page-title">
                <h1>Productos</h1>
                <div class="breadcrumb">Inicio / Productos</div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="filterTable()">
                </div>

                <button class="btn-primary" type="button" onclick="openModal()">
                    + Nuevo Producto
                </button>
            </div>
        </div>

        <div class="error" th:if="${param.error}" th:text="${param.error}"></div>

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>ID Producto</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Proveedor</th>
                    <th>Precio S/.</th>
                    <th>Stock Mín.</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tableBody">
                <tr th:each="prod : ${productos}"
                    th:attr="data-id=${prod.idProducto},
                             data-nombre=${prod.nombre},
                             data-descripcion=${prod.descripcion},
                             data-idcategoria=${prod.idCategoria},
                             data-idproveedor=${prod.idProveedor},
                             data-precio=${prod.precio},
                             data-stock=${prod.stockMinimo}">
                    <td class="prod-id" th:text="${prod.idProducto}">1</td>
                    <td class="prod-name" th:text="${prod.nombre}">Producto</td>
                    <td th:text="${prod.categoria}">Categoría</td>
                    <td th:text="${prod.proveedor}">Proveedor</td>
                    <td class="price" th:text="${prod.precio}">0.00</td>
                    <td th:text="${prod.stockMinimo}">0</td>
                    <td>
                        <span class="badge badge-active">Activo</span>
                    </td>
                    <td>
                        <div class="actions">
                            <button class="btn-icon btn-edit" type="button" onclick="editProduct(this)" title="Editar">✏️</button>

                            <a class="btn-icon btn-delete"
                               th:href="@{/productos/eliminar(id=${prod.idProducto})}"
                               onclick="return confirm('¿Eliminar este producto?')"
                               title="Eliminar">
                                🗑️
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="table-footer">
                <span class="table-info" id="tableInfo">Productos registrados</span>
            </div>
        </div>

    </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="modal-title" id="modalTitle">Nuevo Producto</div>

        <form th:action="@{/productos/guardar}" method="post" th:object="${producto}">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">ID Producto</label>
                    <input class="form-input" type="number" th:field="*{idProducto}" id="fId" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Precio S/.</label>
                    <input class="form-input" type="number" step="0.01" th:field="*{precio}" id="fPrecio" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Nombre del Producto</label>
                <input class="form-input" type="text" th:field="*{nombre}" id="fNombre" required>
            </div>

            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea class="form-textarea" th:field="*{descripcion}" id="fDescripcion"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <select class="form-select" th:field="*{idCategoria}" id="fCategoria" required>
                        <option value="">Seleccione categoría</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.idCategoria}"
                                th:text="${cat.nombreCategoria}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Proveedor</label>
                    <select class="form-select" th:field="*{idProveedor}" id="fProveedor" required>
                        <option value="">Seleccione proveedor</option>
                        <option th:each="prov : ${proveedores}"
                                th:value="${prov.idProveedor}"
                                th:text="${prov.razonSocial}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Stock Mínimo</label>
                <input class="form-input" type="number" th:field="*{stockMinimo}" id="fStock" required>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" type="button" onclick="closeModal()">Cancelar</button>
                <button class="btn-primary" type="submit">Guardar</button>
            </div>

        </form>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("modalTitle").textContent = "Nuevo Producto";
        document.getElementById("fId").value = "";
        document.getElementById("fNombre").value = "";
        document.getElementById("fDescripcion").value = "";
        document.getElementById("fCategoria").value = "";
        document.getElementById("fProveedor").value = "";
        document.getElementById("fPrecio").value = "";
        document.getElementById("fStock").value = "";
        document.getElementById("modalOverlay").classList.add("open");
    }

    function editProduct(btn) {
        const row = btn.closest("tr");

        document.getElementById("modalTitle").textContent = "Editar Producto";
        document.getElementById("fId").value = row.dataset.id;
        document.getElementById("fNombre").value = row.dataset.nombre;
        document.getElementById("fDescripcion").value = row.dataset.descripcion || "";
        document.getElementById("fCategoria").value = row.dataset.idcategoria;
        document.getElementById("fProveedor").value = row.dataset.idproveedor;
        document.getElementById("fPrecio").value = row.dataset.precio;
        document.getElementById("fStock").value = row.dataset.stock;

        document.getElementById("modalOverlay").classList.add("open");
    }

    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
    }

    function closeModalOutside(e) {
        if (e.target.id === "modalOverlay") {
            closeModal();
        }
    }

    function filterTable() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#tableBody tr");
        let visible = 0;

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            const show = text.includes(q);
            row.style.display = show ? "" : "none";
            if (show) visible++;
        });

        document.getElementById("tableInfo").textContent = visible + " producto(s) encontrado(s)";
    }

    filterTable();
</script>

</body>
</html>
